name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Terraform init
        run: terraform -chdir=infra init -input=false

      - name: Resolve ECR URL
        id: ecr
        run: |
          ECR_URL="$(terraform -chdir=infra output -raw ecr_repository_url)"
          echo "ecr_url=$ECR_URL" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_url }}"

      - name: Build and push image
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${DEPLOY_SHA::7}"
          IMAGE_TAG="v-${SHORT_SHA}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t "${{ steps.ecr.outputs.ecr_url }}:${IMAGE_TAG}" \
            --push \
            .

      - name: Terraform plan
        run: terraform -chdir=infra plan -input=false -var="image_tag=${IMAGE_TAG}"

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -input=false -var="image_tag=${IMAGE_TAG}"