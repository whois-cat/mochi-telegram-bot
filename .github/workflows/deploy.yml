name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Terraform init
        run: terraform -chdir=infra init -input=false

      - name: Resolve ECR URL
        id: ecr
        run: |
          ECR_URL="$(terraform -chdir=infra output -raw ecr_repository_url)"
          echo "ecr_url=$ECR_URL" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_url }}"

      - name: Build and push image
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${DEPLOY_SHA::7}"
          IMAGE_TAG="v-${SHORT_SHA}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t "${{ steps.ecr.outputs.ecr_url }}:${IMAGE_TAG}" \
            --push \
            .

      - name: Terraform plan
        run: terraform -chdir=infra plan -input=false -var="image_tag=${IMAGE_TAG}"

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -input=false -var="image_tag=${IMAGE_TAG}"