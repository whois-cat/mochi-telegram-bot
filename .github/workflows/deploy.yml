name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate Python code
        run: |
          uv sync --frozen
          uv run python -m py_compile app/main.py
          uv run python - <<'PY'
          from app.main import handler
          print("main.py import ok")
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Terraform init
        run: terraform -chdir=infra init -input=false

      - name: Resolve ECR URL
        id: ecr
        run: |
          ECR_URL="$(terraform -chdir=infra output -raw ecr_repository_url)"
          echo "ecr_url=$ECR_URL" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${{ steps.ecr.outputs.ecr_url }}"

      - name: Build and push image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="v-${SHORT_SHA}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t "${{ steps.ecr.outputs.ecr_url }}:${IMAGE_TAG}" \
            --push \
            .

      - name: Terraform plan
        run: terraform -chdir=infra plan -input=false -var="image_tag=${IMAGE_TAG}"

      - name: Terraform apply
        run: terraform -chdir=infra apply -auto-approve -input=false -var="image_tag=${IMAGE_TAG}"